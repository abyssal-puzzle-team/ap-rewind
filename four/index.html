<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Abyssal Puzzle</title>
    <style>
        /* --- 样式部分与之前完全相同，此处省略以保持简洁 --- */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&display=swap');

        :root {
            --primary-bg: #0d1117;
            --secondary-bg: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --text-secondary-color: #8b949e;
            --accent-color: #58a6ff;
            --accent-hover-color: #1f6feb;
            --success-color: #3fb950;
            --error-color: #f85149;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-size: 16px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            color: var(--accent-color);
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--accent-color);
        }

        .subtitle {
            color: var(--text-secondary-color);
            margin-bottom: 40px;
        }

        .form-container {
            background-color: var(--secondary-bg);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .form-container h2 {
            margin-bottom: 25px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            background-color: var(--primary-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 1em;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .form-input::placeholder {
            color: var(--text-secondary-color);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-hover-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: var(--accent-color);
        }

        .toggle-link {
            margin-top: 25px;
            color: var(--text-secondary-color);
        }

        .toggle-link a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
        }

        .toggle-link a:hover {
            text-decoration: underline;
        }

        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 6px;
            font-weight: 500;
            display: none;
        }

        .message.success {
            background-color: rgba(63, 185, 80, 0.2);
            color: var(--success-color);
            display: block;
        }

        .message.error {
            background-color: rgba(248, 81, 73, 0.2);
            color: var(--error-color);
            display: block;
        }

        .hidden {
            display: none;
        }
    </style>
    <script src="/four/common.js"></script>
</head>

<body>
    <a href="/index.html"
        style="position: absolute; top: 15px; left: 15px; color: var(--primary-color, #00bfff); text-decoration: none; font-size: 1rem; font-weight: bold; z-index: 9999; cursor: pointer;">&lt;
        返回</a>
    <a href="/four/parse/index.html" target="_blank"
        style="position: absolute; top: 15px; right: 15px; color: var(--primary-color, #00bfff); text-decoration: none; font-size: 1rem; font-weight: bold; z-index: 9999; cursor: pointer;">解析
        &gt;</a>

    <div class="container">
        <h1>Abyssal Puzzle</h1>
        <p class="subtitle">深入迷局，解开深渊的秘密</p>

        <div class="form-container">
            <!-- 进入按钮 -->
            <button id="enterButton" class="btn" style="margin-top: 20px;">进 入 解 谜</button>
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const enterButton = document.getElementById('enterButton');
            const messageDiv = document.getElementById('message');

            function showMessage(text, isSuccess) {
                messageDiv.textContent = text;
                messageDiv.className = 'message';
                messageDiv.classList.add(isSuccess ? 'success' : 'error');
            }

            function setCookie(name, value, days) {
                let expires = "";
                if (days) {
                    const date = new Date();
                    date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                    expires = "; expires=" + date.toUTCString();
                }
                document.cookie = name + "=" + (value || "") + expires + "; path=/";
            }

            enterButton.addEventListener('click', (e) => {
                e.preventDefault();
                showMessage('加载本地数据，即将进入...', true);

                // 设置默认的访客 cookie，如果 common.js 没来得及设的话
                setCookie('username', 'guest', 7);
                setCookie('password', '123', 7);

                setTimeout(() => {
                    window.location.href = 'main.html';
                }, 800);
            });
        });
    </script>
</body>

</html>
