<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssal Puzzle Rewind</title>
    <link rel="icon" href="/favicon.ico">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }
        .button-container {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        a, .dropbtn {
            padding: 15px 40px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            transition: background-color 0.3s;
            border: none;
            cursor: pointer;
            font-family: inherit;
            display: inline-block;
            text-align: center;
        }
        a:hover, .dropbtn:hover {
            background-color: #555;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            bottom: 100%;  
            left: 0;
            background-color: #333;
            min-width: 160px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 5px;
            z-index: 100;
        }

        .dropdown-content a {
            padding: 12px 20px;
            display: block;
            border-radius: 0;
            background-color: transparent;
            font-size: 16px;
            border-bottom: 1px solid #444;
        }
        .dropdown-content a:last-child {
            border-bottom: none;
        }
        .dropdown-content a:hover {
            background-color: #555;
        }

        .show {
            display: block;
        }
        .footer {
            position: fixed;
            bottom: 20px;
            display: flex;
            gap: 30px;
            align-items: center;
        }
        .footer a, .footer .dropbtn {
            padding: 8px 20px;
            background-color: transparent;
            border: 1px solid #555;
            font-size: 14px;
            border-radius: 8px;
            transition: background-color 0.3s;
        }
        .footer a:hover, .footer .dropbtn:hover {
            background-color: #333;
        }
    </style>
</head>
<body>
    <h1>Abyssal Puzzle Rewind</h1>
    <div class="button-container">
        <a href="https://ap1.rewind.abyssal-puzzle.top">Abyssal Puzzle</a>
    </div>
    <div class="footer">
        <a href="https://abyssal-puzzle.top" target="_blank">主页</a>
        <a href="https://github.com/abyssal-puzzle-team/ap-rewind" target="_blank">GitHub</a>
        <div class="dropdown">
            <button class="dropbtn" onclick="toggleDropdown()">Legacy ▾</button>
            <div id="LegacyDropdown" class="dropdown-content">
                <a href="./one/index.html">Legacy 1</a>
                <a href="./two/index.html">Legacy 2</a>
                <a href="./three/index.html">Legacy 3</a>
                <a href="./four/index.html">Legacy 4</a>
            </div>
        </div>
    </div>

    <script>
        function toggleDropdown() {
            document.getElementById("LegacyDropdown").classList.toggle("show");
        }
        window.onclick = function(event) {
            if (!event.target.matches('.dropbtn')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }
    </script>
</body>
</html>
